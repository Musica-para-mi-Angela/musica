
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="player">

<img src="img/portada.jpg" class="cover">

<h2 id="title">Borrador</h2>
<h3 id="artist">Prince Royce</h3>

<audio id="audio">
<source src="music/cancion.mp3" type="audio/mpeg">
</audio>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

<input type="range" id="progress" value="0">

<div class="controls">
<button id="prev">⏮</button>
<button id="play">▶</button>
<button id="next">⏭</button>
</div>

<div class="lyrics">
<p>
A veces las palabras no son suficientes<br>
e hice esto para ti, para que veas lo mucho<br>
que me importas <3 <br>

</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
